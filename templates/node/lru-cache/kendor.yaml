# yaml-language-server: $schema=https://kendor.dev/config-schema/v1
# Single-file Node challenge. The candidate edits solution.js; the hidden test grades the LRUCache
# via the suite harness (node --test -> TAP). The .solution/ reference is stripped from the seed.
version: 1
runtime:
  type: node
  version: "22"
services:
  app:
    test:
      command: node --test
kendor:
  type: SINGLE_FILE
  title: "LRU Cache"
  difficulty: hard
  category: Algorithms
  tags: [data-structures, cache, map]
  gradeService: app
  editablePaths:
    - solution.js
  solutionDir: .solution
