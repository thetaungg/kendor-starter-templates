# yaml-language-server: $schema=https://kendor.dev/config-schema/v1
# Single-file Node challenge. The candidate edits solution.js; the hidden test uses node:test mock
# timers to grade debounce/throttle via the suite harness (node --test -> TAP). No preview.
version: 1
runtime:
  type: node
  version: "22"
services:
  app:
    test:
      command: node --test
kendor:
  type: SINGLE_FILE
  title: "Implement debounce & throttle"
  difficulty: medium
  category: Algorithms
  tags: [closures, timers, functions]
  gradeService: app
  editablePaths:
    - solution.js
  solutionDir: .solution
