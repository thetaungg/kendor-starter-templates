# yaml-language-server: $schema=https://kendor.dev/config-schema/v1
# Declarative runtime config — the single source of truth for how this project installs, runs and is
# graded in the Kendor sandbox. The backend re-emits an authoritative copy of this file at provision;
# editing it inside the sandbox does not change how your code boots or scores.
version: 1
runtime:
  type: node
  version: "22"
install:
  commands:
    - npm ci
services:
  app:
    dev:
      command: npm run dev -- --port $PORT
      port: 5173
preview:
  service: app
# Starter-catalog metadata — read by the registry seed (title/order drive the builder dropdown).
kendor:
  title: Vite + React (JavaScript)
  entryFile: src/App.jsx
  order: 1
